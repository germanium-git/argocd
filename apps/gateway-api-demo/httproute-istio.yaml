---
# Smoke test for the Istio gateway engine (apps/istio) — same whoami
# backend as the Traefik demo, routed through a distinct hostname.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-istio
  namespace: gw-api-demo
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: istio-gateway
      namespace: istio-system
      sectionName: web
  hostnames:
    - "gwapidemo-istio.germanium.cz"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: whoami
          port: 80
