---
# HTTPS routing with TLS termination and path rewrite demo
#
# Routes:
#   gwapidemo.germanium.cz/api/*  →  rewritten to /*  →  whoami  (URLRewrite filter)
#   gwapidemo.germanium.cz/*      →  direct            →  whoami
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-https
  namespace: gw-api-demo
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway-tls
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "gwapidemo.germanium.cz"
  rules:
    # Path rewrite: strip /api prefix before forwarding
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: whoami
          port: 80
          weight: 1
    # Default: route everything else directly
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: whoami
          port: 80
          weight: 1
