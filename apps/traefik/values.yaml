traefik:
  ingressRoute:
    dashboard:
      enabled: false
  providers:
    kubernetesIngress:
      publishedService:
        enabled: true
  experimental:
    kubernetesGateway:
      enabled: true
      namespacePolicy: All
      certificate:
        group: ""
        kind: Secret
        name: wildcard-germanium-cz-tls
  ports:
    metrics:
      expose:
        default: true
