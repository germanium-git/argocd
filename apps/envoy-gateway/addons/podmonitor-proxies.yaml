---
# Envoy Gateway auto-provisions a new Envoy proxy Deployment+Service per
# Gateway resource (gatewayClassName: envoy-gateway), each pod labeled
# gateway.envoyproxy.io/owning-gateway-name. A static ServiceMonitor can't
# target these since they don't exist until a Gateway is created, so this
# PodMonitor matches any such pod in any namespace instead.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-gateway-proxies
  namespace: envoy-gateway-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchExpressions:
    - key: gateway.envoyproxy.io/owning-gateway-name
      operator: Exists
  namespaceSelector:
    any: true
  podMetricsEndpoints:
  - portNumber: 19001
    path: /stats/prometheus
    interval: 15s
    scheme: http
