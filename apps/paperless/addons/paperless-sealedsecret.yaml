# App secrets: PAPERLESS_SECRET_KEY and PAPERLESS_ADMIN_PASSWORD
# Generate with:
#   kubectl create secret generic paperless-secrets \
#     --namespace paperless \
#     --from-literal=PAPERLESS_SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=PAPERLESS_ADMIN_PASSWORD="your-password" \
#     --dry-run=client -o yaml | kubeseal --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: paperless-secrets
  namespace: paperless
spec:
  encryptedData:
    PAPERLESS_ADMIN_PASSWORD: 
    PAPERLESS_SECRET_KEY: 
  template:
    metadata:
      creationTimestamp: null
      name: paperless-secrets
      namespace: paperless    
    type: Opaque
---
# PostgreSQL secrets consumed by the Bitnami postgresql subchart
# postgres-password = superuser (postgres) password
# password          = paperless app-user password (also used as PAPERLESS_DBPASS)
# Generate with:
#   kubectl create secret generic paperless-postgresql \
#     --namespace paperless \
#     --from-literal=postgres-password="your-postgres-superuser-password" \
#     --from-literal=password="your-paperless-db-password" \
#     --dry-run=client -o yaml | kubeseal --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: paperless-postgresql
  namespace: paperless
spec:
  encryptedData:
    password: 
    postgres-password: 
  template:
    metadata:
      creationTimestamp: null
      name: paperless-postgresql
      namespace: paperless
    type: Opaque
