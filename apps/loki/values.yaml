loki:
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2023-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      allow_structured_metadata: true
      ingestion_burst_size_mb: 16
      ingestion_rate_mb: 8
      max_global_streams_per_user: 5000
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      retention_period: 168h
      volume_enabled: true
    pattern_ingester:
      enabled: true
  singleBinary:
    replicas: 1
    extraArgs:
      - -log.level=warn
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
  gateway:
    verboseLogging: false
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  monitoring:
    serviceMonitor:
      labels:
        release: kube-prometheus-stack
