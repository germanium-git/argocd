---
# Istio's Gateway API deployment controller auto-provisions a new proxy
# Deployment+Service per Gateway resource (gatewayClassName: istio), each
# labeled gateway.networking.k8s.io/gateway-name (the standard Gateway API
# label, not an Istio-specific one - confirmed on the live pod, not
# istio.io/gateway-name as originally assumed). A static ServiceMonitor
# can't target these since they don't exist until a Gateway is created, so
# this PodMonitor matches any such pod in any namespace instead.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-gateways
  namespace: istio-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchExpressions:
    - key: gateway.networking.k8s.io/gateway-name
      operator: Exists
  namespaceSelector:
    any: true
  podMetricsEndpoints:
  # targetPort accepts a plain integer and is deprecated in favor of a named
  # `port`, but the cluster's installed Prometheus Operator CRD (from 2023,
  # predates kube-prometheus-stack's CRD upgrades) doesn't support the newer
  # `portNumber` field.
  - targetPort: 15090
    path: /stats/prometheus
    interval: 15s
    scheme: http
