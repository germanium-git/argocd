n8n:
  timezone: Europe/Prague

  main:
    extraEnvVars:
      N8N_TRUST_PROXY: "true"

    persistence:
      enabled: true
      storageClass: "nfs-atlas"
      size: 8Gi
      accessMode: ReadWriteOnce

  ingress:
    enabled: true
    className: "traefik"
    annotations:
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      external-dns.alpha.kubernetes.io/hostname: n8n.germanium.cz
      external-dns.alpha.kubernetes.io/target: f14686c6-e006-4076-9b65-a84d93aa2e01.cfargotunnel.com
    hosts:
      - host: n8n.germanium.cz
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: n8n-germanium-cz-prod-tls
        hosts:
          - n8n.germanium.cz
