# values.dev.yaml

service:
  type: ClusterIP
  port: 8080

# Enable basic env variables; do not put secrets here in plaintext
env:
  - name: LOG_LEVEL
    value: info

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Simple readiness/liveness probes (align path/port with your server)
probes:
  liveness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
  readiness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
